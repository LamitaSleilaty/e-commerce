# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - talamitafrontennd

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build
        working-directory: ./frontend
        env:
          # Next.js inlines NEXT_PUBLIC_* vars at build time, so this has to be
          # set here now that the build runs in CI instead of Azure's Oryx build.
          NEXT_PUBLIC_API_URL: "https://talamita-eqbjhqabdmh6gfaz.centralus-01.azurewebsites.net/api"
        run: |
          npm install
          npm run build

      - name: Assemble standalone output
        # output: "standalone" in next.config.js produces a pruned server +
        # node_modules in .next/standalone, but doesn't include static assets or
        # public/ by default -- those have to be copied in manually.
        working-directory: ./frontend
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Package app as zip (preserves node_modules/.bin symlinks)
        # actions/upload-artifact@v4 drops symlinks, which mangles node_modules/.bin.
        # Zipping first keeps them intact, and azure/webapps-deploy accepts a zip
        # package directly. This also ships a fully built app instead of relying on
        # Azure's Oryx build, which was hanging indefinitely during deploy.
        working-directory: ./frontend/.next/standalone
        run: zip -ry ../../../frontend.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_29AD2A0D342E43B9A68323AD4ABBE090 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EE4EA612DF904A949A0FE257C30192F1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_78EE19C09629470085F60BFEC0D75120 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'talamitafrontennd'
          slot-name: 'Production'
          package: frontend.zip
          