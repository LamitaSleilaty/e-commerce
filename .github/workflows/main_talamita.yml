# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - talamita

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        working-directory: ./backend
        env:
          # prisma generate (run via postinstall) only reads schema.prisma — it never
          # connects to the DB — but Prisma 7's config loader still requires this env
          # var to resolve. The real DATABASE_URL lives in Azure App Service settings
          # and is used at runtime by `prisma migrate deploy` in the startup command.
          DATABASE_URL: "postgresql://user:password@localhost:5432/placeholder"
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_72845133EDF640079C1F4F26D2E76B71 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CF4F076331AB4111B4DC01B6307D4BA5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D274628EDAE14EEF8DB1305025DBEEE9 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'talamita'
          slot-name: 'Production'
          package: .
          